<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Cow Verification</title>

<style>

*{
   margin:0;
   padding:0;
   box-sizing:border-box;
   font-family:Arial,sans-serif;
}

body{
   background:
   linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
   url("https://images.unsplash.com/photo-1570042225831-d98fa7577f1e?w=1200");

   background-size:cover;
   background-position:center;

   color:white;

   display:flex;

   justify-content:center;

   align-items:center;

   min-height:100vh;
}

.verify-box{

   width:90%;
   max-width:550px;

   background:rgba(20,20,20,.85);

   padding:40px;

   border-radius:25px;

   border:3px solid gold;

   text-align:center;

   backdrop-filter:blur(6px);

   box-shadow:0 0 30px rgba(255,215,0,.25);

}

.cow{
   font-size:5rem;
   margin-bottom:15px;
}

h1{
   margin-bottom:15px;
}

p{
   color:#ddd;

   line-height:1.7;

   margin-bottom:30px;
}

.buttons{
   display:flex;

   gap:15px;

   justify-content:center;

   flex-wrap:wrap;
}

button{

   padding:15px 26px;

   border:none;

   border-radius:15px;

   cursor:pointer;

   font-size:1rem;

   transition:.25s;
}

.enter{

   background:gold;

   color:black;
}

.enter:hover{
   transform:scale(1.08);
}

.exit{

   background:#333;

   color:white;
}

.exit:hover{
   background:#444;
}

.small{
   margin-top:20px;
   font-size:.85rem;
   opacity:.7;
}

</style>
</head>

<body>

<div class="verify-box">

<div class="cow">🐄</div>

<h1>Security Cow Verification</h1>

<p>
Before entering premium cow territory,
confirm your eligibility and prepare
for maximum bovine excellence.
</p>

<div class="buttons">

<button
class="enter"
onclick="location.href='checkout.html'">

✅ Enter the Pasture

</button>

<button
class="exit"
onclick="location.href='index.html'">

❌ Return to the Barn

</button>

</div>

<div class="small">

Authorized by the Department of Premium Cows

</div>

</div>

</body>
</html>
