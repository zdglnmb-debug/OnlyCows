<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Verification</title>

<style>
*{
   margin:0;
   padding:0;
   box-sizing:border-box;
   font-family:Arial,sans-serif;
}

body{
   background:#111;
   color:white;

   display:flex;
   justify-content:center;
   align-items:center;

   min-height:100vh;
}

.verify-box{
   width:90%;
   max-width:500px;

   background:#1d1d1d;

   padding:40px;

   border-radius:20px;

   text-align:center;

   border:2px solid gold;
}

h1{
   margin-bottom:15px;
}

p{
   color:#ccc;
   margin-bottom:30px;
   line-height:1.6;
}

.buttons{
   display:flex;
   gap:15px;
   justify-content:center;
}

button{
   padding:14px 30px;

   border:none;

   border-radius:12px;

   cursor:pointer;

   font-size:1rem;

   transition:.25s;
}

.enter{
   background:gold;
}

.enter:hover{
   transform:scale(1.05);
}

.leave{
   background:#333;
   color:white;
}

.leave:hover{
   background:#444;
}
</style>
</head>

<body>

<div class="verify-box">

<h1>🐄 Age Verification</h1>

<p>
You must be 18 years or older to access premium cow content.
By continuing, you confirm you meet the age requirement.
</p>

<div class="buttons">

<button class="enter"
onclick="location.href='onlycows.html'">
I am 18+
</button>

<button class="leave"
onclick="location.href='index.html'">
Go Back
</button>

</div>

</div>

</body>
</html>
