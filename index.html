<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnlyCows</title>

<style>
*{
   margin:0;
   padding:0;
   box-sizing:border-box;
   font-family:Arial, sans-serif;
}

/* animated background (FIXED — not overwritten) */
body{
   background: linear-gradient(-45deg, #111, #1a1a1a, #0f0f0f, #222);
   background-size: 400% 400%;
   animation: gradientShift 12s ease infinite;
   color:white;
}

@keyframes gradientShift{
   0%{background-position:0% 50%;}
   50%{background-position:100% 50%;}
   100%{background-position:0% 50%;}
}

/* HERO */
.hero{
   min-height:100vh;
   background-image:url("https://images.unsplash.com/photo-1570042225831-d98fa7577f1e?w=1200&auto=format&fit=crop&q=80");
   background-size:cover;
   background-position:25% center;
   display:flex;
   align-items:center;
   justify-content:center;
   flex-direction:column;
   text-align:center;
   padding:20px;
}

.hero h1{
   font-size:5rem;
   text-shadow:2px 2px 10px black;
}

.hero p{
   font-size:1.3rem;
   margin-top:10px;
}

/* CONTENT */
.content{
   padding:100px 20px;
   text-align:center;
}

.cow-gallery{
   display:grid;
   grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
   gap:20px;
   margin-top:50px;
}

.cow-gallery img{
   width:100%;
   height:250px;
   object-fit:cover;
   border-radius:15px;
}

/* BUTTON BOX (RESTORED) */
.onlycows-box{
   width:250px;
   margin:50px auto;
   padding:30px;
   background:#222;
   border:3px solid gold;
   border-radius:20px;
   cursor:pointer;
   transition:0.3s;
   text-align:center;
}

.onlycows-box:hover{
   transform:scale(1.08);
   background:#333;
}

.icon{
   font-size:4rem;
}

/* FLOATING COWS */
.cow-particles{
   position:fixed;
   top:0;
   left:0;
   width:100%;
   height:100%;
   pointer-events:none;
   overflow:hidden;
   z-index:-1;
}

.cow-particles span{
   position:absolute;
   font-size:20px;
   opacity:0.15;
   animation:floatUp linear forwards;
}

@keyframes floatUp{
   from{ transform:translateY(100vh); }
   to{ transform:translateY(-10vh); }
}
.stats,
.facts,
.featured,
.theme-area{
margin:40px auto;
max-width:900px;
}

.stats{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
font-size:1.2rem;
}

.fact-box{
background:#222;
padding:20px;
border-radius:15px;
margin-top:15px;
}

.featured{
background:#1c1c1c;
padding:25px;
border-radius:20px;
border:2px solid gold;
}

.theme-btn{
padding:12px 20px;
background:#222;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
}

.light{
background:#eee;
color:black;
}

.rating{
margin-top:10px;
font-size:1rem;
}
							</style>


							</head>

<body>

<div class="cow-particles"></div>

<section class="hero">
   <h1>🐄 OnlyCows</h1>
   <p>The internet's premier destination for cows.</p>
</section>

<section class="content">

<h2>Free cow pictures</h2>

<div class="stats">
<div>🐄 Cows Viewed: <span id="views">42918</span></div>
<div>🥛 Gallons Appreciated: <span id="milk">18440</span></div>
</div>

<div class="theme-area">
<button class="theme-btn" id="themeToggle">
🌙 Night Pasture
</button>
</div>

<div class="featured">
<h2 id="featuredCow"></h2>
</div>

<div class="facts">
<div class="fact-box" id="factBox">
Loading cow wisdom...
</div>
</div>

<div class="cow-gallery">

<div>
<img src="https://images.unsplash.com/photo-1618080206739-14e8ac105472?w=600">
<div class="rating">⭐⭐⭐⭐⭐</div>
</div>

<div>
<img src="https://images.unsplash.com/photo-1546445317-29f4545e9d53?w=600">
<div class="rating">⭐⭐⭐⭐☆</div>
</div>

<div>
<img src="https://images.unsplash.com/photo-1593768697824-f31b967e6c55?w=600">
<div class="rating">⭐⭐⭐⭐⭐</div>
</div>

</div>

<div class="onlycows-box" onclick="warp()">
<div class="icon">🐄</div>
<h2>OnlyCows</h2>
<p>Click for premium cow content.</p>
</div>
</section>

											<script>
<script>

document.addEventListener("DOMContentLoaded",()=>{

function spawnCow(){

const cow=document.createElement("span");

cow.textContent="🐄";

cow.style.left=Math.random()*100+"vw";

cow.style.animationDuration=
(6+Math.random()*6)+"s";

document
.querySelector(".cow-particles")
.appendChild(cow);

setTimeout(
()=>cow.remove(),
12000
);

}

setInterval(spawnCow,800);

/* STATS */

setInterval(()=>{

views.textContent=
Number(views.textContent)+
Math.floor(Math.random()*5);

milk.textContent=
Number(milk.textContent)+1;

},1500);

/* FACTS */

const facts=[

"Cows have best friends",

"Cows can recognize faces",

"Cows communicate emotions",

"Cows enjoy routines"

];

let fact=0;

factBox.textContent=
"🐄 "+facts[0];

setInterval(()=>{

fact++;

factBox.textContent=
"🐄 "+facts[
fact%facts.length
];

},4000);

/* FEATURED */

const cows=[

"Bessie",

"Moozilla",

"Milkshake",

"Sir Moo"

];

featuredCow.innerHTML=
"🏆 Cow of the Day:<br><br>"+
cows[
new Date().getDate()
%
cows.length
];

/* SECRET CODE */

let code="";

document.addEventListener(
"keydown",

e=>{

code+=
e.key.toUpperCase();

if(
code.includes("MOO")
){

alert(
"🐄 SECRET HERD UNLOCKED"
);

for(
let i=0;
i<50;
i++
)

spawnCow();

code="";

}

}

/* CURSOR TRAIL */

);

document.addEventListener(
"mousemove",

e=>{

if(
Math.random()>.85
){

const c=
document.createElement(
"div"
);

c.textContent="🐄";

c.style.position=
"fixed";

c.style.left=
e.clientX+"px";

c.style.top=
e.clientY+"px";

c.style.pointerEvents=
"none";

document.body.append(c);

setTimeout(
()=>c.remove(),
500
);

}

}

);

/* THEME */

themeToggle.onclick=()=>{

document.body.classList.toggle(
"light"
);

};

/* WARP */

window.warp=()=>{

for(
let i=0;
i<100;
i++
)
spawnCow();

setTimeout(

()=>{

location.href=
"verify.html";

},

1600);

};

});

</script>
											</script>

</body>
</html>
