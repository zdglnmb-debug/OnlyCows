<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:
linear-gradient(-45deg,#111,#1a1a1a,#0f0f0f,#222);

background-size:400% 400%;

animation:gradientShift 12s ease infinite;

color:white;
}

@keyframes gradientShift{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.hero{

min-height:100vh;

background-image:
url("https://images.unsplash.com/photo-1570042225831-d98fa7577f1e?w=1200");

background-size:cover;

background-position:25% center;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

text-align:center;

padding:20px;

}

.hero h1{

font-size:5rem;

text-shadow:2px 2px 10px black;

}

.hero p{

font-size:1.3rem;

margin-top:10px;

}

.content{

padding:100px 20px;

text-align:center;

}

.stats{

display:flex;

justify-content:center;

gap:40px;

flex-wrap:wrap;

font-size:1.2rem;

margin:40px auto;

}

.cow-gallery{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;

margin-top:50px;

}

.cow-gallery img{

width:100%;

height:250px;

object-fit:cover;

border-radius:15px;

}

.rating{

margin-top:10px;

}

.onlycows-box{

width:250px;

margin:50px auto;

padding:30px;

background:#222;

border:3px solid gold;

border-radius:20px;

cursor:pointer;

transition:.3s;

}

.onlycows-box:hover{

transform:scale(1.08);

background:#333;

}

.icon{

font-size:4rem;

}

.cow-particles{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

pointer-events:none;

overflow:hidden;

z-index:-1;

}

.cow-particles span{

position:absolute;

font-size:20px;

opacity:.15;

animation:floatUp linear forwards;

}

@keyframes floatUp{

from{

transform:translateY(100vh);

}

to{

transform:translateY(-10vh);

}

}

</style>
</head>

<script>

document.addEventListener(
"DOMContentLoaded",
()=>{

function spawnCow(){

const cow=
document.createElement(
"span"
);

cow.textContent=
"🐄";

cow.style.left=
Math.random()*100+"vw";

cow.style.animationDuration=
(6+Math.random()*6)+"s";

document
.querySelector(
".cow-particles"
)
.appendChild(
cow
);

setTimeout(
()=>cow.remove(),
12000
);

}

setInterval(
spawnCow,
800
);

/* STATS */

setInterval(()=>{

views.textContent=

Number(
views.textContent
)

+

Math.floor(
Math.random()*5
);

milk.textContent=

Number(
milk.textContent
)

+1;

},1500);

/* SECRET */

let code="";

document.addEventListener(
"keydown",
e=>{

code+=
e.key.toUpperCase();

if(
code.includes(
"MOO"
)
){

alert(
"🐄 SECRET HERD UNLOCKED"
);

for(
let i=0;
i<50;
i++
){

spawnCow();

}

code="";

}

}

);

/* CURSOR */

document.addEventListener(
"mousemove",
e=>{

if(
Math.random()>.85
){

const c=
document.createElement(
"div"
);

c.textContent=
"🐄";

c.style.position=
"fixed";

c.style.left=
e.clientX+"px";

c.style.top=
e.clientY+"px";

c.style.pointerEvents=
"none";

document.body.append(c);

setTimeout(
()=>c.remove(),
500
);

}

}

);

/* WARP */

window.warp=
()=>{

for(
let i=0;
i<60;
i++
){

spawnCow();

}

setTimeout(

()=>{

location.href=
"verify.html";

},

1600

);

};

});

</script>

<script type="module">

import {
initializeApp
}

from
"https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {

getFirestore,

doc,

getDoc,

setDoc

}

from
"https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyDWSHE4TbIrxqlTFmvKI3lru-EwpXPsPgI",

authDomain:"moo-counter.firebaseapp.com",

projectId:"moo-counter",

storageBucket:"moo-counter.firebasestorage.app",

messagingSenderId:"49819577726",

appId:"1:49819577726:web:4dbfa187e83f020442172f"

};

const app=
initializeApp(
firebaseConfig
);

const db=
getFirestore(
app
);

async function loadVotes(){

const ref=
doc(
db,
"poll",
"cowVotes"
);

const snap=
await getDoc(
ref
);

if(
snap.exists()
){

const data=
snap.data();

ratingValue.textContent=

(
data.total
/
data.votes
).toFixed(1);

voteCount.textContent=
data.votes;

}else{

await setDoc(
ref,
{
total:50,
votes:10
}
);

loadVotes();

}

}

window.vote=
async stars=>{

const ref=
doc(
db,
"poll",
"cowVotes"
);

const snap=
await getDoc(
ref
);

const data=
snap.data();

await setDoc(
ref,
{

total:
data.total
+
stars,

votes:
data.votes
+
1

}

);

loadVotes();

};

loadVotes();

</script>
