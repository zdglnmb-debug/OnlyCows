<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnlyCows</title>
<style>
*{
   margin:0;
   padding:0;
   box-sizing:border-box;
   font-family:Arial, sans-serif;
}
body{
   background:#111;
   color:white;
}
.hero{
   height:100vh;
   background-image:url("https://images.unsplash.com/photo-1516467508483-a7212febe31a");
   background-size:cover;
   background-position:center;
   background-attachment:fixed;
   display:flex;
   align-items:center;
   justify-content:center;
   flex-direction:column;
   text-align:center;
}
.hero h1{
   font-size:5rem;
   text-shadow:2px 2px 10px black;
}
.hero p{
   font-size:1.3rem;
   margin-top:10px;
}
.content{
   padding:100px 20px;
   text-align:center;
}
.onlycows-box{
   width:250px;
   margin:50px auto;
   padding:30px;
   background:#222;
   border:3px solid gold;
   border-radius:20px;
   cursor:pointer;
   transition:0.3s;
}
.onlycows-box:hover{
   transform:scale(1.08);
   background:#333;
}
.icon{
   font-size:4rem;
}
.cow-gallery{
   display:grid;
   grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
   gap:20px;
   margin-top:50px;
}
.cow-gallery img{
   width:100%;
   height:250px;
   object-fit:cover;
   border-radius:15px;
}
</style>
</head>
<body>
<section class="hero">
<h1>🐄 OnlyCows</h1>
<p>The internet's premier destination for cows.</p>
</section>
<section class="content">
<h2>Featured Cows</h2>
<div class="cow-gallery">
<img src="https://picsum.photos/500/500?random=1" alt="">
<img src="https://picsum.photos/500/500?random=2" alt="">
<img src="https://picsum.photos/500/500?random=3" alt="">
</div>
<div class="onlycows-box" onclick="location.href='onlycows.html'">
<div class="icon">📦</div>
<h2>OnlyCows</h2>
<p>Click for premium cow content.</p>
</div>
</section>
</body>
</html>
