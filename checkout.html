<!DOCTYPE html>
<html>

<head>

<title>OnlyCows Premium</title>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#111,
#222
);

color:white;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

text-align:center;

}

.box{

background:#1c1c1c;

padding:50px;

border-radius:25px;

border:3px solid gold;

max-width:600px;

width:90%;

}

h1{

font-size:3rem;

margin-bottom:20px;

}

.price-card{

margin:30px auto;

padding:20px;

background:#333;

border-radius:15px;

}

.bar{

width:100%;

height:18px;

background:#333;

border-radius:20px;

overflow:hidden;

margin-top:30px;

}

.fill{

height:100%;

width:0%;

background:gold;

transition:width .15s linear;

}

.status{

opacity:.8;

margin-top:20px;

}

.small{

opacity:.7;

margin-top:20px;

font-size:.9rem;

}

</style>

</head>

<body>

<div class="box">

<h1>
🐄 Premium Access
</h1>

<p>
Calculating payment for premium cow viewing…
</p>

<div class="price-card">

Subscription access:
<br><br>

<strong>$4.99/month</strong>

</div>

<div class="bar">

<div class="fill" id="fill"></div>

</div>

<div class="status" id="status">

Connecting to Cow Payment System…

</div>

<div class="small">

Processing…
Please do not milk your browser.

</div>

</div>

<script>

const fill =
document.getElementById("fill");

const status =
document.getElementById("status");

let progress = 0;

const messages = [

"Connecting to Cow Payment System…",

"Verifying pasture access…",

"Checking milk balance…",

"Approving premium cows…",

"Finalizing barn entry…",

"Success!"

];

const timer = setInterval(() => {

progress += 2.5;

fill.style.width = progress + "%";

if(progress > 15)
status.textContent = messages[1];

if(progress > 35)
status.textContent = messages[2];

if(progress > 55)
status.textContent = messages[3];

if(progress > 75)
status.textContent = messages[4];

if(progress >= 100){

clearInterval(timer);

status.textContent = messages[5];

setTimeout(() => {

location.href = "onlycows.html";

}, 600);

}

}, 120);

</script>

</body>

</html>
